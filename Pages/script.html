<!DOCTYPE html lang="en" charset="UTF-8" viewport="width=device-width, initial-scale=1.0">
<html>
<head>
    <script>
        (async function validateSession() {
            // debugger;
            const VALIDATE_URL = "https://lwebber.ca/api/validate";

            // Pages that should never trigger a redirect (e.g. the login page itself)
            const PUBLIC_PATHS = ["/login", "/login.html"];

            const isPublicPage = PUBLIC_PATHS.some(p =>
                window.location.pathname === p || window.location.pathname.startsWith(p)
            );

            try {
                const response = await fetch(VALIDATE_URL, {
                    method: "GET",
                    credentials: "include",   // sends the httpOnly cookie automatically
                    headers: {
                    "Accept": "application/json"
                    }
                });

                if (response.ok) {
                    // Token is valid — optionally expose the payload to the page
                    const data = await response.json().catch(() => null);
                    if (data) {
                    // Store non-sensitive info for the rest of the page to use
                    window.__session = data;
                    }
                } else {
                    // 401 / 403 → token missing, expired, or invalid
                    if (!isPublicPage) {
                    window.location.href = "/login.html?reason=session_expired";
                    }
                }
            } catch (err) {
                // Network error or server unreachable
                console.warn("[auth] Validation request failed:", err);
                if (!isPublicPage) {
                    window.location.href = "/login?reason=network_error";
                }
            }
        })();
    </script>

    <link rel="stylesheet" href="../css/Script.css">
</head>
<body>
    <p>Load your own script</p>
</body>
</html>
