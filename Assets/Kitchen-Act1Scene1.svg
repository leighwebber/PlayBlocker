<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580">

  <!-- paper -->
  <rect width="900" height="580" fill="#f0ede8"/>

  <!-- ══════════════════════════════════════════════
       STAGE STRUCTURE  (draw back-to-front)
       ══════════════════════════════════════════════ -->

  <!-- Back wall -->
  <polygon points="205,55 695,55 695,200 205,200" fill="#edeae4" stroke="#aaa" stroke-width="1.5"/>

  <!-- Left wall (solid, with door opening cut in later) -->
  <polygon points="80,555 205,200 205,55 80,410" fill="#ccc9c1" stroke="#aaa" stroke-width="1.5"/>

  <!-- Right wall -->
  <polygon points="820,555 695,200 695,55 820,410" fill="#d2cec6" stroke="#aaa" stroke-width="1.5"/>

  <!-- Stage floor -->
  <polygon points="80,555 820,555 695,200 205,200" fill="#d5d2c9" stroke="#aaa" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       BACK WALL DRESSING
       ══════════════════════════════════════════════ -->

  <!-- Upper cabinets (full width, top of back wall) -->
  <rect x="207" y="58"  width="486" height="54" fill="#c4aa82" stroke="#8a7050" stroke-width="1"/>
  <line x1="290" y1="58" x2="290" y2="112" stroke="#8a7050" stroke-width="1"/>
  <line x1="378" y1="58" x2="378" y2="112" stroke="#8a7050" stroke-width="1"/>
  <line x1="466" y1="58" x2="466" y2="112" stroke="#8a7050" stroke-width="1"/>
  <line x1="554" y1="58" x2="554" y2="112" stroke="#8a7050" stroke-width="1"/>
  <line x1="630" y1="58" x2="630" y2="112" stroke="#8a7050" stroke-width="1"/>
  <!-- handles -->
  <circle cx="248" cy="90" r="3" fill="#8a7050"/>
  <circle cx="334" cy="90" r="3" fill="#8a7050"/>
  <circle cx="422" cy="90" r="3" fill="#8a7050"/>
  <circle cx="510" cy="90" r="3" fill="#8a7050"/>
  <circle cx="594" cy="90" r="3" fill="#8a7050"/>

  <!-- Backsplash (between upper cabinets and counter) -->
  <rect x="207" y="112" width="148" height="40" fill="#ddd8cc"/>
  <rect x="545" y="112" width="148" height="40" fill="#ddd8cc"/>

  <!-- Window above sink (center of back wall) -->
  <rect x="355" y="112" width="190" height="40" fill="#b8dff2" stroke="#6888a0" stroke-width="1.5"/>
  <line x1="450" y1="112" x2="450" y2="152" stroke="#6888a0" stroke-width="1.5"/>
  <!-- sill -->
  <rect x="351" y="151" width="198" height="5" fill="#c0a870"/>

  <!-- Counter — back face (lower section of back wall) -->
  <rect x="207" y="152" width="486" height="48" fill="#b89060" stroke="#8a6030" stroke-width="1"/>
  <!-- counter drawer/door details -->
  <rect x="218" y="165" width="42" height="12" rx="2" fill="none" stroke="#8a6030" stroke-width="1"/>
  <rect x="272" y="165" width="42" height="12" rx="2" fill="none" stroke="#8a6030" stroke-width="1"/>
  <rect x="425" y="165" width="32" height="10" rx="1" fill="none" stroke="#8a6030" stroke-width="1"/>
  <rect x="465" y="165" width="32" height="10" rx="1" fill="none" stroke="#8a6030" stroke-width="1"/>
  <rect x="556" y="165" width="42" height="12" rx="2" fill="none" stroke="#8a6030" stroke-width="1"/>
  <rect x="610" y="165" width="42" height="12" rx="2" fill="none" stroke="#8a6030" stroke-width="1"/>

  <!-- Counter top surface (thin foreshortened strip above the face) -->
  <polygon points="207,152 693,152 682,165 218,165" fill="#caa870" stroke="#8a6030" stroke-width="0.5"/>

  <!-- Counter front face (visible on stage floor, forward of back wall) -->
  <polygon points="218,165 682,165 670,214 230,214" fill="#a07840" stroke="#8a6030" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       APPLIANCES
       ══════════════════════════════════════════════ -->

  <!-- REFRIGERATOR — stage-left corner, taller than counter -->
  <!-- front face -->
  <rect x="207" y="98" width="60" height="102" fill="#d8d8d8" stroke="#909090" stroke-width="1.5"/>
  <!-- freezer section -->
  <line x1="207" y1="133" x2="267" y2="133" stroke="#aaa" stroke-width="1"/>
  <!-- handles -->
  <rect x="258" y="109" width="5" height="18" fill="#aaa" rx="2"/>
  <rect x="258" y="140" width="5" height="32" fill="#aaa" rx="2"/>
  <!-- top surface (parallelogram going toward back wall) -->
  <polygon points="207,98 267,98 271,107 211,107" fill="#c8c8c8"/>
  <!-- right side face -->
  <polygon points="267,98 271,107 271,200 267,200" fill="#b8b8b8"/>

  <!-- STOVE — left of centre in counter -->
  <!-- top surface (in counter top strip) -->
  <polygon points="278,152 366,152 360,163 272,163" fill="#606060"/>
  <!-- burners (foreshortened ellipses) -->
  <ellipse cx="294" cy="157" rx="11" ry="4" fill="none" stroke="#444" stroke-width="2"/>
  <ellipse cx="324" cy="157" rx="11" ry="4" fill="none" stroke="#444" stroke-width="2"/>
  <ellipse cx="350" cy="157" rx="10" ry="4" fill="none" stroke="#444" stroke-width="2"/>
  <!-- stove front face (dark panel in counter face) -->
  <polygon points="272,165 362,165 353,208 281,208" fill="#505050"/>
  <!-- control knobs -->
  <circle cx="285" cy="171" r="4" fill="#777"/>
  <circle cx="303" cy="171" r="4" fill="#777"/>
  <circle cx="337" cy="171" r="4" fill="#777"/>
  <circle cx="355" cy="171" r="4" fill="#777"/>
  <!-- oven door line -->
  <line x1="278" y1="187" x2="357" y2="187" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- SINK — centre of counter -->
  <!-- basin on counter top -->
  <polygon points="396,152 500,152 494,163 402,163" fill="#88b0c8"/>
  <ellipse cx="448" cy="157" rx="45" ry="5" fill="#70a0b8" stroke="#6888a0" stroke-width="1"/>
  <!-- faucet -->
  <rect x="442" y="143" width="10" height="12" fill="#999" rx="2"/>
  <rect x="434" y="148" width="26" height="6" fill="#999" rx="2"/>

  <!-- ══════════════════════════════════════════════
       DOOR OPENINGS IN SIDE WALLS
       ══════════════════════════════════════════════ -->

  <!-- LEFT WALL — door to living room (stage-left, forward third of wall) -->
  <polygon points="112,418 155,340 155,448 112,526" fill="#2a2520"/>
  <!-- door frame highlight -->
  <line x1="155" y1="340" x2="155" y2="448" stroke="#8a7860" stroke-width="2"/>
  <line x1="112" y1="418" x2="155" y2="340" stroke="#8a7860" stroke-width="2"/>
  <!-- label -->
  <text x="65" y="478" font-family="Arial,sans-serif" font-size="9" fill="#888" transform="rotate(-28 65 478)">living room</text>

  <!-- RIGHT WALL — door to hallway (Tyler's exit, forward third of wall) -->
  <polygon points="788,418 745,340 745,448 788,526" fill="#2a2520"/>
  <!-- door frame -->
  <line x1="745" y1="340" x2="745" y2="448" stroke="#8a7860" stroke-width="2"/>
  <line x1="788" y1="418" x2="745" y2="340" stroke="#8a7860" stroke-width="2"/>
  <!-- label -->
  <text x="852" y="468" font-family="Arial,sans-serif" font-size="9" fill="#888" transform="rotate(28 852 468)">hallway</text>

  <!-- ══════════════════════════════════════════════
       TABLE  (centre stage)
       ══════════════════════════════════════════════ -->

  <!-- Table top -->
  <polygon points="318,352 582,352 564,428 300,428" fill="#c09060" stroke="#7a4e28" stroke-width="2.5"/>
  <!-- Table front face -->
  <polygon points="300,428 564,428 560,446 296,446" fill="#a07840" stroke="#7a4e28" stroke-width="1.5"/>
  <!-- Table right apron (side face) -->
  <polygon points="564,428 582,352 582,370 564,446" fill="#8a6030"/>
  <!-- Front legs -->
  <rect x="306" y="444" width="14" height="88" fill="#8a5e28" rx="2"/>
  <rect x="548" y="444" width="14" height="88" fill="#8a5e28" rx="2"/>
  <!-- Back legs (stubs above table top) -->
  <rect x="326" y="340" width="12" height="16" fill="#7a5020"/>
  <rect x="548" y="340" width="12" height="16" fill="#7a5020"/>

  <!-- PIE -->
  <ellipse cx="450" cy="390" rx="30" ry="11" fill="#e0a060" stroke="#a06020" stroke-width="1.5"/>
  <ellipse cx="450" cy="383" rx="30" ry="11" fill="#e8b870" stroke="#b07030" stroke-width="1.5"/>
  <path d="M450,372 L464,383 L436,383 Z" fill="#c07030"/>
  <text x="450" y="416" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#5a3010">pie</text>

  <!-- ══════════════════════════════════════════════
       CHAIRS
       ══════════════════════════════════════════════ -->

  <!-- UPSTAGE row (behind table, partially hidden) -->
  <polygon points="328,322 384,322 380,346 324,346" fill="#9a6840" stroke="#6a4020" stroke-width="1.5"/>
  <polygon points="322,322 328,322 324,346 318,346" fill="#7a5030"/>

  <polygon points="422,314 478,314 474,338 418,338" fill="#9a6840" stroke="#6a4020" stroke-width="1.5"/>

  <polygon points="514,318 570,318 566,342 510,342" fill="#9a6840" stroke="#6a4020" stroke-width="1.5"/>
  <polygon points="570,318 576,318 572,342 566,342" fill="#7a5030"/>

  <!-- DOWNSTAGE row (in front of table, chairs face audience) -->
  <!-- chair seats -->
  <polygon points="302,450 370,450 366,474 298,474" fill="#9a6840" stroke="#6a4020" stroke-width="1.5"/>
  <!-- chair backs -->
  <line x1="298" y1="430" x2="368" y2="430" stroke="#7a5030" stroke-width="5" stroke-linecap="round"/>
  <line x1="297" y1="450" x2="297" y2="430" stroke="#7a5030" stroke-width="4" stroke-linecap="round"/>
  <line x1="369" y1="450" x2="369" y2="430" stroke="#7a5030" stroke-width="4" stroke-linecap="round"/>

  <polygon points="400,458 468,458 464,482 396,482" fill="#9a6840" stroke="#6a4020" stroke-width="1.5"/>
  <line x1="396" y1="438" x2="466" y2="438" stroke="#7a5030" stroke-width="5" stroke-linecap="round"/>
  <line x1="395" y1="458" x2="395" y2="438" stroke="#7a5030" stroke-width="4" stroke-linecap="round"/>
  <line x1="467" y1="458" x2="467" y2="438" stroke="#7a5030" stroke-width="4" stroke-linecap="round"/>

  <polygon points="496,452 564,452 560,476 492,476" fill="#9a6840" stroke="#6a4020" stroke-width="1.5"/>
  <line x1="492" y1="432" x2="562" y2="432" stroke="#7a5030" stroke-width="5" stroke-linecap="round"/>
  <line x1="491" y1="452" x2="491" y2="432" stroke="#7a5030" stroke-width="4" stroke-linecap="round"/>
  <line x1="563" y1="452" x2="563" y2="432" stroke="#7a5030" stroke-width="4" stroke-linecap="round"/>

  <!-- STAGE-LEFT chair (side of table) -->
  <polygon points="258,382 280,360 280,424 258,446" fill="#9a6840" stroke="#6a4020" stroke-width="1.5"/>
  <line x1="256" y1="360" x2="256" y2="424" stroke="#7a5030" stroke-width="5" stroke-linecap="round"/>

  <!-- STAGE-RIGHT chair (side of table) -->
  <polygon points="600,372 622,354 622,418 600,440" fill="#9a6840" stroke="#6a4020" stroke-width="1.5"/>
  <line x1="624" y1="354" x2="624" y2="418" stroke="#7a5030" stroke-width="5" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════════
       TITLE
       ══════════════════════════════════════════════ -->
  <text x="450" y="570" text-anchor="middle"
        font-family="Georgia,serif" font-size="12" font-style="italic" fill="#777">
    A Family of Our Own · Act I, Scene 1 · The Kitchen
  </text>

</svg>
