<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="680" viewBox="0 0 900 680">

  <!-- Paper background -->
  <rect width="900" height="680" fill="#f5f2eb"/>

  <!-- ── TITLE ── -->
  <text x="450" y="24" text-anchor="middle"
        font-family="Georgia,serif" font-size="14" font-style="italic" fill="#333">
    A Family of Our Own · Act I, Scene 1 · The Kitchen
  </text>

  <!-- ── DIRECTION LABELS ── -->
  <text x="450" y="50" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="10" fill="#999" letter-spacing="4">UPSTAGE</text>
  <text x="450" y="654" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="10" fill="#999" letter-spacing="4">DOWNSTAGE</text>
  <text x="22" y="338" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="10" fill="#999" letter-spacing="3"
        transform="rotate(-90 22 338)">STAGE LEFT</text>
  <text x="878" y="338" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="10" fill="#999" letter-spacing="3"
        transform="rotate(90 878 338)">STAGE RIGHT</text>

  <!-- ── WALLS (solid fill; interior floor painted on top) ── -->
  <rect x="75" y="58" width="750" height="558" fill="#2e2820" rx="3"/>
  <rect x="95" y="78" width="710" height="518" fill="#ede8dc"/>

  <!-- ── UPSTAGE COUNTER ── -->
  <rect x="95" y="78" width="710" height="90" fill="#c8b08a" stroke="#8a7050" stroke-width="1.5"/>
  <!-- cabinet divisions -->
  <line x1="195" y1="78" x2="195" y2="168" stroke="#8a7050" stroke-width="1"/>
  <line x1="320" y1="78" x2="320" y2="168" stroke="#8a7050" stroke-width="1"/>
  <line x1="430" y1="78" x2="430" y2="168" stroke="#8a7050" stroke-width="1"/>
  <line x1="530" y1="78" x2="530" y2="168" stroke="#8a7050" stroke-width="1"/>
  <line x1="635" y1="78" x2="635" y2="168" stroke="#8a7050" stroke-width="1"/>
  <line x1="730" y1="78" x2="730" y2="168" stroke="#8a7050" stroke-width="1"/>
  <text x="450" y="130" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" fill="#5a4030" letter-spacing="3">
    C A B I N E T S  /  C O U N T E R
  </text>

  <!-- ── REFRIGERATOR (stage-left corner) ── -->
  <rect x="95" y="168" width="96" height="148" fill="#d5d5d5" stroke="#808080" stroke-width="2"/>
  <rect x="95" y="168" width="96" height="55"  fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <!-- handles -->
  <rect x="180" y="183" width="6" height="22" fill="#aaa" rx="3"/>
  <rect x="180" y="233" width="6" height="45" fill="#aaa" rx="3"/>
  <text x="143" y="336" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" fill="#555">FRIDGE</text>

  <!-- ── STOVE ── -->
  <rect x="230" y="82" width="108" height="82" fill="#6a6a6a" stroke="#404040" stroke-width="2"/>
  <circle cx="258" cy="106" r="14" fill="none" stroke="#444" stroke-width="3"/>
  <circle cx="314" cy="106" r="14" fill="none" stroke="#444" stroke-width="3"/>
  <circle cx="258" cy="150" r="14" fill="none" stroke="#444" stroke-width="3"/>
  <circle cx="314" cy="150" r="14" fill="none" stroke="#444" stroke-width="3"/>
  <circle cx="258" cy="106" r="3" fill="#555"/>
  <circle cx="314" cy="106" r="3" fill="#555"/>
  <circle cx="258" cy="150" r="3" fill="#555"/>
  <circle cx="314" cy="150" r="3" fill="#555"/>
  <text x="284" y="183" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" fill="#444">STOVE</text>

  <!-- ── WINDOW above sink ── -->
  <rect x="392" y="58" width="125" height="22" fill="#b8ddf4" stroke="#6888a0" stroke-width="2"/>
  <line x1="455" y1="58" x2="455" y2="80" stroke="#6888a0" stroke-width="1.5"/>
  <text x="455" y="55" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" fill="#6888a0">WINDOW</text>

  <!-- ── SINK ── -->
  <rect x="395" y="82" width="130" height="78" fill="#a8c8d8" stroke="#60889a" stroke-width="2" rx="4"/>
  <rect x="403" y="89"  width="54"  height="62" fill="#88b0c8" stroke="#60889a" stroke-width="1" rx="3"/>
  <rect x="463" y="89"  width="54"  height="62" fill="#88b0c8" stroke="#60889a" stroke-width="1" rx="3"/>
  <!-- faucet bridge -->
  <rect x="448" y="82" width="14" height="18" fill="#909090" rx="3"/>
  <rect x="436" y="88" width="38" height="8"  fill="#909090" rx="3"/>
  <text x="460" y="182" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" fill="#444">SINK</text>

  <!-- ── DISHWASHER ── -->
  <rect x="530" y="82" width="72" height="78" fill="#cccccc" stroke="#888" stroke-width="1.5"/>
  <text x="566" y="125" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="10" fill="#666">D/W</text>

  <!-- ── KITCHEN TABLE ── -->
  <rect x="298" y="276" width="306" height="210" fill="#c09060" stroke="#7a4e28" stroke-width="3" rx="12"/>
  <text x="451" y="388" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="14" fill="#4a2808" font-weight="bold">TABLE</text>

  <!-- pie (charming prop detail) -->
  <circle cx="451" cy="320" r="22" fill="#e8a055" stroke="#a06020" stroke-width="2"/>
  <path d="M451 298 L451 320 L469 309 Z" fill="#b07030"/>
  <text x="451" y="358" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" font-style="italic" fill="#5a3010">pie</text>

  <!-- chairs — upstage row -->
  <rect x="316" y="242" width="56" height="32" fill="#9a6e42" stroke="#6a4020" stroke-width="2" rx="5"/>
  <rect x="422" y="242" width="56" height="32" fill="#9a6e42" stroke="#6a4020" stroke-width="2" rx="5"/>
  <rect x="528" y="242" width="56" height="32" fill="#9a6e42" stroke="#6a4020" stroke-width="2" rx="5"/>
  <!-- chairs — downstage row -->
  <rect x="316" y="488" width="56" height="32" fill="#9a6e42" stroke="#6a4020" stroke-width="2" rx="5"/>
  <rect x="422" y="488" width="56" height="32" fill="#9a6e42" stroke="#6a4020" stroke-width="2" rx="5"/>
  <rect x="528" y="488" width="56" height="32" fill="#9a6e42" stroke="#6a4020" stroke-width="2" rx="5"/>
  <!-- chair — stage left -->
  <rect x="254" y="336" width="42" height="58" fill="#9a6e42" stroke="#6a4020" stroke-width="2" rx="5"/>
  <!-- chair — stage right -->
  <rect x="606" y="336" width="42" height="58" fill="#9a6e42" stroke="#6a4020" stroke-width="2" rx="5"/>

  <!-- ── DOOR: TO HALLWAY (right wall, mid-stage) ── -->
  <!-- gap in right wall -->
  <rect x="805" y="385" width="22" height="100" fill="#ede8dc"/>
  <!-- hinge at top of gap; door swings into room -->
  <line x1="805" y1="385" x2="705" y2="385" stroke="#2e2820" stroke-width="3"/>
  <path d="M705,385 A100,100 0 0,0 805,485"
        fill="none" stroke="#2e2820" stroke-width="1.5" stroke-dasharray="7,4"/>
  <!-- wall trim lines at gap edges -->
  <line x1="805" y1="383" x2="827" y2="383" stroke="#2e2820" stroke-width="3"/>
  <line x1="805" y1="487" x2="827" y2="487" stroke="#2e2820" stroke-width="3"/>
  <text x="847" y="438" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="10" fill="#555"
        transform="rotate(90 847 438)">TO HALLWAY / EXIT</text>

  <!-- ── DOOR: TO LIVING ROOM (bottom wall, left of centre) ── -->
  <!-- gap in bottom wall -->
  <rect x="148" y="596" width="100" height="22" fill="#ede8dc"/>
  <!-- hinge at left of gap; door swings into room (upward) -->
  <line x1="148" y1="596" x2="148" y2="496" stroke="#2e2820" stroke-width="3"/>
  <path d="M148,496 A100,100 0 0,1 248,596"
        fill="none" stroke="#2e2820" stroke-width="1.5" stroke-dasharray="7,4"/>
  <!-- wall trim lines at gap edges -->
  <line x1="146" y1="596" x2="146" y2="618" stroke="#2e2820" stroke-width="3"/>
  <line x1="250" y1="596" x2="250" y2="618" stroke="#2e2820" stroke-width="3"/>
  <text x="198" y="646" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="10" fill="#555">TO LIVING ROOM</text>

  <!-- ── SCALE BAR ── -->
  <line x1="620" y1="643" x2="790" y2="643" stroke="#777" stroke-width="2"/>
  <line x1="620" y1="638" x2="620" y2="648" stroke="#777" stroke-width="2"/>
  <line x1="705" y1="638" x2="705" y2="648" stroke="#777" stroke-width="2"/>
  <line x1="790" y1="638" x2="790" y2="648" stroke="#777" stroke-width="2"/>
  <text x="662" y="636" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" fill="#777">5 ft</text>
  <text x="748" y="636" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" fill="#777">5 ft</text>
  <text x="705" y="660" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" fill="#777">approx. 1 in = 5 ft</text>

</svg>
